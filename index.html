<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kunstvoll Studio</title>
	<link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="i18n.js" defer></script>
    <script src="effects.js" defer></script>
</head>
<body>

<header>
    <h1>Kunstvoll Studio</h1>
	<h_name>Art created @home by Ynou</h_name>
</header>

<nav>
    <a href="#home" data-i18n="home">Home</a>
    <a href="about.html" data-i18n="about">Über mich</a>
    <a href="#gallery" data-i18n="gallery">Galerie</a>
    <div class="lang-switch">
        <button type="button" data-lang="de">DE</button>
        <button type="button" data-lang="nl">NL</button>
        <button type="button" data-lang="fr">FR</button>
        <button type="button" data-lang="en">EN</button>
    </div>
</nav>

<div class="container" id="home">
    <section class="hero">
        <div class="slider">
            <div class="slides">
                <div class="slide"><img src="hero1.jpg" alt="Banner 1"></div>
                <div class="slide"><img src="hero2.jpg" alt="Banner 2"></div>
                <div class="slide"><img src="hero3.jpg" alt="Banner 3"></div>
            </div>
            <div class="slider-dots"></div>
        </div>
        <h2 data-i18n="heroTitle">Entdecken Sie die Kunst der Kreativität</h2>
        <p data-i18n="heroText">Entdecken Sie meine Sammlung von Kunstwerken, die Realismus mit abstrakten Elementen vereinen.</p>
        <p>&#128231; <span data-i18n="contact">Kontakt</span>: ynou.kunstvoll@gmail.com</p>
    </section>
</div>

<div class="container" id="gallery">
    <section class="gallery">
        <h2 class="reveal" data-i18n="gallery">Galerie</h2>
        <div class="gallery-grid"></div>
    </section>
</div>
<footer>
    <p>&#128231; ynou.kunstvoll@gmail.com</p>
</footer>

<div id="myModal" class="modal">
    <div class="modal-counter" id="modalCounter"></div>
    <span class="close" onclick="closeModal()" onkeydown="if(event.key==='Enter')closeModal()" data-i18n-aria="closeImage" role="button" tabindex="0">&times;</span>
    <button type="button" class="modal-nav modal-prev" onclick="stepModal(-1)" data-i18n-aria="prevImage">&#10094;</button>
    <img class="modal-content" id="img01" alt="">
    <button type="button" class="modal-nav modal-next" onclick="stepModal(1)" data-i18n-aria="nextImage">&#10095;</button>
    <div class="modal-caption" id="modalCaption"></div>
</div>

<script>
    // Lightbox mit Navigation: galleryData wird in buildGallery gefüllt,
    // sodass man mit Pfeilen/Pfeiltasten/Wischen durch alle Werke blättern kann
    const galleryData = []; // { src, title, dims }
    let modalIndex = -1;

    function renderModal() {
        const entry = galleryData[modalIndex];
        if (!entry) return;
        const modalImg = document.getElementById("img01");
        modalImg.src = entry.src;
        modalImg.alt = entry.title || "";

        const caption = document.getElementById("modalCaption");
        caption.textContent = "";
        if (entry.title) {
            caption.appendChild(document.createTextNode(entry.title));
            const dims = document.createElement("span");
            dims.className = "dims";
            dims.textContent = " · " + entry.dims;
            caption.appendChild(dims);
        }

        document.getElementById("modalCounter").textContent =
            (modalIndex + 1) + " / " + galleryData.length;
    }

    function openModal(index) {
        modalIndex = index;
        renderModal();
        document.getElementById("myModal").classList.add("open");
        document.body.style.overflow = "hidden"; // Seite dahinter nicht scrollbar
    }

    function closeModal() {
        document.getElementById("myModal").classList.remove("open");
        document.body.style.overflow = "";
    }

    function stepModal(direction) {
        if (!galleryData.length) return;
        modalIndex = (modalIndex + direction + galleryData.length) % galleryData.length;
        renderModal();
    }



    // Galerie wird zur Laufzeit aus dem Repository-Verzeichnis geladen
    // (GitHub Contents API). Diese Dateien werden nicht angezeigt:
    const EXCLUDE_FILES = new Set([
        "hero1.jpg",
        "hero2.jpg",
        "hero3.jpg",
        "favicon.png",
        "Ueberschrifthintergrund.jpg",
        "untracked.jpg"
    ]);
    const IMAGE_EXT_RE = /\.(jpe?g|png|gif|webp)$/i;
    const REPO_CONTENTS_URL = "https://api.github.com/repos/Kunstvoll-Studio/Kunstvoll-Studio/contents/";

    // Bilder, die nicht mehr erhältlich sind: Dateinamen hier eintragen
    // (genau wie im Repository, inkl. Endung). Am Bild erscheint dann ein Hinweis.
    // Beispiel: "Meer__50x50x1.jpg",
    const UNAVAILABLE_FILES = new Set([
    "Aqua Nullius 2.1__100x100x4.jpg",
    "China #1__50x60x1.jpg",
    "Gegen den Strom #1__70x70x1.jpg",
    "La Belle__100x120x4.JPG",
    "Meer__50x50x1.jpg",
    "NUR DIE SCHÖNEN TAGE ZÄHLEN__100x100x4.jpeg",
    "Naakt #1__60x80x2.jpg",
    "Natur - Blüten #1__50x50x1.jpg",
    "Natur - Regen #1__50x50x1.jpg",
    "Niemandsland 2.2__100x100x4.jpeg",
    "Niemandsland 2.3__100x100x4.jpeg",
    "Niemandsland 2.5__100x100x4.jpeg",
    "Panorama #1__70x100x2.jpg",
    "Rode Tulpjes__50x50x1.jpeg",
    "Sailing #1__140x70x4.JPG",
    "Segler__120x120x1.jpeg",
    "Strudel, auf anderen wegen__120x100x4.jpg",
    "Vasen #1__50x70x1.jpg",
    "Portrait einer Frau 1 XL__100x100x4.jpeg",
    ]);

    async function loadImageList() {
        const response = await fetch(REPO_CONTENTS_URL);
        if (!response.ok) throw new Error("GitHub API " + response.status);
        const items = await response.json();
        return items
            .filter(item => item.type === "file")
            .map(item => item.name)
            .filter(name => IMAGE_EXT_RE.test(name) && !EXCLUDE_FILES.has(name));
    }

    function parseFilename(filename) {
        const base = filename.replace(/\.[^.]+$/, '');
        const sep = base.lastIndexOf('__');
        if (sep === -1) return { title: null, dims: null };
        const dims = base.slice(sep + 2);
        if (!/^\d+x\d+x\d+$/.test(dims)) return { title: null, dims: null };
        return { title: base.slice(0, sep), dims: dims + ' cm' };
    }

    // 3D-Karteneffekt: kippt die Karte je nach Mausposition und setzt die
    // CSS-Variablen, die style.css für Transform und Glanzlicht auswertet
    const TILT_MAX = 10; // maximaler Kippwinkel in Grad

    function enableTilt(media) {
        media.addEventListener('pointermove', (e) => {
            if (e.pointerType !== 'mouse') return; // kein Kippen beim Scrollen auf Touchgeräten
            const rect = media.getBoundingClientRect();
            const px = (e.clientX - rect.left) / rect.width;  // 0 = links, 1 = rechts
            const py = (e.clientY - rect.top) / rect.height;  // 0 = oben, 1 = unten
            media.style.setProperty('--ry', ((px - 0.5) * 2 * TILT_MAX).toFixed(2) + 'deg');
            media.style.setProperty('--rx', ((0.5 - py) * 2 * TILT_MAX).toFixed(2) + 'deg');
            media.style.setProperty('--mx', (px * 100).toFixed(1) + '%');
            media.style.setProperty('--my', (py * 100).toFixed(1) + '%');
        });
        media.addEventListener('pointerleave', () => {
            media.style.removeProperty('--rx');
            media.style.removeProperty('--ry');
        });
    }

    async function buildGallery() {
        const grid = document.querySelector('.gallery-grid');
        if (!grid) return;

        let galleryImages;
        try {
            galleryImages = await loadImageList();
        } catch (err) {
            console.error("Galerie konnte nicht geladen werden:", err);
            return;
        }

        const fragment = document.createDocumentFragment();
        galleryImages.forEach((filename, index) => {
            const { title, dims } = parseFilename(filename);
            const src = encodeURIComponent(filename);
            galleryData.push({ src, title, dims });

            const item = document.createElement('div');
            item.className = 'gallery-item reveal';
            // Gestaffeltes Einblenden: Nachbarn erscheinen kurz nacheinander
            item.style.transitionDelay = (index % 4) * 70 + 'ms';

            // Bild und Badge liegen in einem gemeinsamen Wrapper,
            // damit beide beim Hovern zusammen kippen und skalieren
            const media = document.createElement('div');
            media.className = 'gallery-media';

            // Seitenverhältnis aus den Werkmaßen (z. B. 100x70):
            // der Platzhalter hat schon die richtige Größe, nichts springt
            if (dims) {
                const [w, h] = dims.split('x');
                media.style.aspectRatio = w + ' / ' + h;
            }

            const img = document.createElement('img');
            img.src = src;
            img.alt = title || filename;
            img.loading = 'lazy';
            img.decoding = 'async';
            img.addEventListener('click', () => openModal(index));
            // Schimmer-Platzhalter beenden, sobald das Bild da ist
            const markLoaded = () => media.classList.add('loaded');
            img.addEventListener('load', markLoaded);
            img.addEventListener('error', markLoaded);
            if (img.complete && img.naturalWidth) markLoaded();
            media.appendChild(img);

            if (UNAVAILABLE_FILES.has(filename)) {
                item.classList.add('unavailable');
                const badge = document.createElement('div');
                badge.className = 'badge-unavailable';
                badge.dataset.i18n = 'unavailable'; // wird beim Sprachwechsel mit übersetzt
                badge.textContent = t('unavailable');
                media.appendChild(badge);
            }

            enableTilt(media);
            item.appendChild(media);

            if (title) {
                const overlay = document.createElement('div');
                overlay.className = 'overlay';
                const text = document.createElement('div');
                text.className = 'text';
                text.appendChild(document.createTextNode(title));
                text.appendChild(document.createElement('br'));
                text.appendChild(document.createTextNode(dims));
                overlay.appendChild(text);
                item.appendChild(overlay);
            }

            fragment.appendChild(item);
        });
        grid.appendChild(fragment);

        // Einblenden beim Scrollen (observeReveal kommt aus effects.js)
        if (typeof observeReveal === 'function') {
            grid.querySelectorAll('.gallery-item').forEach(observeReveal);
        } else {
            grid.querySelectorAll('.gallery-item').forEach(el => el.classList.add('visible'));
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        buildGallery();

        // Hero-Slider: weiche Überblendung, Ken-Burns-Zoom (style.css),
        // Punkte-Navigation und Pause, solange die Maus darüber steht
        const slider = document.querySelector('.slider');
        const slides = document.querySelectorAll('.slide');
        const dotsWrap = document.querySelector('.slider-dots');
        if (slider && slides.length) {
            let currentIndex = 0;
            let timer = null;

            const dots = Array.from(slides, (_, i) => {
                const dot = document.createElement('button');
                dot.type = 'button';
                dot.setAttribute('aria-label', 'Slide ' + (i + 1));
                dot.addEventListener('click', () => { goToSlide(i); restartTimer(); });
                dotsWrap.appendChild(dot);
                return dot;
            });

            function goToSlide(index) {
                slides[currentIndex].classList.remove('active');
                dots[currentIndex].classList.remove('active');
                currentIndex = index;
                slides[currentIndex].classList.add('active');
                dots[currentIndex].classList.add('active');
            }

            function nextSlide() {
                goToSlide((currentIndex + 1) % slides.length);
            }

            function restartTimer() {
                clearInterval(timer);
                timer = setInterval(nextSlide, 5000);
            }

            goToSlide(0);
            restartTimer();
            slider.addEventListener('mouseenter', () => clearInterval(timer));
            slider.addEventListener('mouseleave', restartTimer);
        }

        // Lightbox: Klick auf den dunklen Hintergrund schließt,
        // Pfeiltasten blättern, Escape schließt, Wischen am Handy blättert
        const modal = document.getElementById("myModal");
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (!modal.classList.contains('open')) return;
            if (e.key === 'Escape') closeModal();
            else if (e.key === 'ArrowLeft') stepModal(-1);
            else if (e.key === 'ArrowRight') stepModal(1);
        });

        let touchStartX = null;
        modal.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        }, { passive: true });
        modal.addEventListener('touchend', (e) => {
            if (touchStartX === null) return;
            const deltaX = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(deltaX) > 50) stepModal(deltaX > 0 ? -1 : 1);
            touchStartX = null;
        }, { passive: true });
    });

</script>
</body>
</html>
