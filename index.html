<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kunstvoll Studio</title>
	<link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <h1>Kunstvoll Studio</h1>
	<h_name>Art created @home by Ynou</h_name>
</header>

<nav>
    <a href="#home">Home</a>
    <a href="about.html">About</a>
    <a href="#gallery">Gallery</a>
</nav>

<div class="container" id="home">
    <section class="hero">
        <div class="slider">
            <div class="slides">
                <div class="slide"><img src="hero1.jpg" alt="Banner 1"></div>
                <div class="slide"><img src="hero2.jpg" alt="Banner 2"></div>
                <div class="slide"><img src="hero3.jpg" alt="Banner 3"></div>
            </div>
        </div>
        <h2>Discover the Art of Creativity</h2>
        <p>Entdecken Sie meine Sammlung von Kunstwerken, die Realismus mit abstrakten Elementen vereinen.</p>
        <p>&#128231; Kontakt: ynou.kunstvoll@gmail.com</p>
    </section>
</div>

<div class="container" id="gallery">
    <section class="gallery">
        <h2>Gallery</h2>
        <div class="gallery-grid"></div>
    </section>
</div>
<footer>
    <p>&#128231; ynou.kunstvoll@gmail.com</p>
</footer>

<div id="myModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="img01">
</div>

<script>
    function showImage(imgElement) {
        var modal = document.getElementById("myModal");
        var modalImg = document.getElementById("img01");
        modal.style.display = "block";
        modalImg.src = imgElement.src;
    }

    function closeModal() {
        var modal = document.getElementById("myModal");
        modal.style.display = "none";
    }

    

    // Reihenfolge der Bilder in der Galerie.
    // Format: "Titel__BREITExHÖHExTIEFE.ext" — Titel und Maße werden daraus geparst.
    // Bilder ohne "__BxHxT" werden ohne Overlay angezeigt.
    const galleryImages = [
        "La Belle__100x120x4.JPG",
        "Naakt #1__60x80x2.jpg",
        "Gegen den Strom #1__70x70x1.jpg",
        "Strudel, auf anderen wegen__120x100x4.jpg",
        "Keramikschalen__100x70x1.jpg",
        "Boa__120x100x4.jpg",
        "Panorama #1__70x100x2.jpg",
        "Corona #1__60x90x1.jpg",
        "Skyline #1__100x100x1.jpg",
        "Vasen #1__50x70x1.jpg",
        "Springtimes #1__50x70x1.jpg",
        "Beduine__60x80x1.jpg",
        "Bottles #1__60x80x1.jpg",
        "IMG_0972.jpg",
        "China #1__50x60x1.jpg",
        "Fackelzug__50x60x1.jpg",
        "IMG_0975.jpg",
        "IMG_0976.jpg",
        "IMG_0978.jpg",
        "IMG_0980.jpg",
        "Welle__50x50x1.jpg",
        "Meer__50x50x1.jpg",
        "Natur - Blüten #1__50x50x1.jpg",
        "Polarlichter #1__40x40x1.jpg",
        "Granatapfel__40x40x1.jpg",
        "Niemandsland #2__40x40x1.jpg",
        "Niemandsland #1__50x50x1.jpg",
        "Natur - Kälte #1__50x50x1.jpg",
        "Niemandsland #3__50x50x1.jpg",
        "Natur - Regen #1__50x50x1.jpg",
        "Natur - Wald #1__50x50x1.jpg",
        "Aqua Nullius 2.1__100x100x4.jpg",
        "Niemandsland 2.1__100x100x4.jpg",
        "Hortensien #1__80x100x1.jpg",
        "IMG_0996.jpg",
        "Happy fish__70x100x2.jpg",
        "IMG_0936.jpg",
        "Flou__100x120x4.jpg",
        "Niemandsland 2.2__100x100x4.jpeg",
        "Sailing #1__140x70x4.JPG",
        "Niemandsland 2.3__100x100x4.jpg",
        "Niemandsland 2.4__100x100x4.jpg",
        "Aqua Nullius 2.2__100x100x4.jpg",
        "Gegen den Strom #1__140x70x4.jpg"
    ];

    function parseFilename(filename) {
        const base = filename.replace(/\.[^.]+$/, '');
        const sep = base.lastIndexOf('__');
        if (sep === -1) return { title: null, dims: null };
        const dims = base.slice(sep + 2);
        if (!/^\d+x\d+x\d+$/.test(dims)) return { title: null, dims: null };
        return { title: base.slice(0, sep), dims: dims + ' cm' };
    }

    function buildGallery() {
        const grid = document.querySelector('.gallery-grid');
        if (!grid) return;
        const fragment = document.createDocumentFragment();
        galleryImages.forEach(filename => {
            const { title, dims } = parseFilename(filename);

            const item = document.createElement('div');
            item.className = 'gallery-item';

            const img = document.createElement('img');
            img.src = encodeURIComponent(filename);
            img.alt = title || filename;
            img.loading = 'lazy';
            img.decoding = 'async';
            img.addEventListener('click', () => showImage(img));
            item.appendChild(img);

            if (title) {
                const overlay = document.createElement('div');
                overlay.className = 'overlay';
                const text = document.createElement('div');
                text.className = 'text';
                text.appendChild(document.createTextNode(title));
                text.appendChild(document.createElement('br'));
                text.appendChild(document.createTextNode(dims));
                overlay.appendChild(text);
                item.appendChild(overlay);
            }

            fragment.appendChild(item);
        });
        grid.appendChild(fragment);
    }

    document.addEventListener("DOMContentLoaded", function() {
        buildGallery();

        // Slider
        const slides = document.querySelectorAll('.slide');
        let currentIndex = 0;

        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.style.display = i === index ? 'block' : 'none';
            });
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % slides.length;
            showSlide(currentIndex);
        }

        showSlide(currentIndex);
        setInterval(nextSlide, 3000);
    });

</script>
</body>
</html>
