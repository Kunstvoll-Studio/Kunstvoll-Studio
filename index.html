<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kunstvoll Studio</title>
    <meta name="description" content="Kunstvoll Studio – Kunstwerke von Ynou: Acryl- und Spachtelbilder zwischen Realismus und Abstraktion. Entdecken Sie die Galerie mit verfügbaren Originalen.">
    <meta name="theme-color" content="#1c1d22">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Kunstvoll Studio">
    <meta property="og:title" content="Kunstvoll Studio – Art created @home by Ynou">
    <meta property="og:description" content="Kunstwerke zwischen Realismus und Abstraktion – entdecken Sie die Galerie von Ynou.">
    <meta property="og:image" content="https://raw.githubusercontent.com/Kunstvoll-Studio/Kunstvoll-Studio/main/hero1.jpg">
    <meta name="twitter:card" content="summary_large_image">
	<link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://wsrv.nl">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="i18n.js" defer></script>
    <script src="effects.js" defer></script>
</head>
<body>

<header>
    <h1>Kunstvoll Studio</h1>
	<h_name>Art created @home by Ynou</h_name>
</header>

<nav>
    <a href="#home" data-i18n="home">Home</a>
    <a href="about.html" data-i18n="about">Über mich</a>
    <a href="#gallery" data-i18n="gallery">Galerie</a>
    <div class="lang-switch">
        <button type="button" data-lang="de">DE</button>
        <button type="button" data-lang="nl">NL</button>
        <button type="button" data-lang="fr">FR</button>
        <button type="button" data-lang="en">EN</button>
    </div>
</nav>

<div class="container" id="home">
    <section class="hero">
        <div class="slider">
            <div class="slides">
                <!-- Verkleinerte WebP-Version über wsrv.nl; bei Ausfall lädt onerror das Original -->
                <div class="slide"><img src="https://wsrv.nl/?url=https://raw.githubusercontent.com/Kunstvoll-Studio/Kunstvoll-Studio/main/hero1.jpg&w=1600&output=webp&q=80" onerror="this.onerror=null;this.src='hero1.jpg'" alt="Banner 1"></div>
                <div class="slide"><img src="https://wsrv.nl/?url=https://raw.githubusercontent.com/Kunstvoll-Studio/Kunstvoll-Studio/main/hero2.jpg&w=1600&output=webp&q=80" onerror="this.onerror=null;this.src='hero2.jpg'" alt="Banner 2"></div>
                <div class="slide"><img src="https://wsrv.nl/?url=https://raw.githubusercontent.com/Kunstvoll-Studio/Kunstvoll-Studio/main/hero3.jpg&w=1600&output=webp&q=80" onerror="this.onerror=null;this.src='hero3.jpg'" alt="Banner 3"></div>
            </div>
            <!-- Animations-Ebenen über den Folien: Vignette, goldener
                 Lichtstreif und Goldstaub (Partikel erzeugt das Skript) -->
            <div class="slider-vignette" aria-hidden="true"></div>
            <div class="slider-glow" aria-hidden="true"></div>
            <div class="slider-particles" aria-hidden="true"></div>
            <div class="slider-dots"></div>
        </div>
        <h2 data-i18n="heroTitle">Entdecken Sie die Kunst der Kreativität</h2>
        <p data-i18n="heroText">Entdecken Sie meine Sammlung von Kunstwerken, die Realismus mit abstrakten Elementen vereinen.</p>
        <p>&#128231; <span data-i18n="contact">Kontakt</span>: ynou.kunstvoll@gmail.com</p>
    </section>
</div>

<div class="container" id="gallery">
    <section class="gallery">
        <h2 class="reveal" data-i18n="gallery">Galerie</h2>
        <div class="gallery-grid"></div>
    </section>
</div>
<footer>
    <p>&#128231; ynou.kunstvoll@gmail.com</p>
</footer>

<div id="myModal" class="modal">
    <div class="modal-counter" id="modalCounter"></div>
    <span class="close" onclick="closeModal()" onkeydown="if(event.key==='Enter')closeModal()" data-i18n-aria="closeImage" role="button" tabindex="0">&times;</span>
    <button type="button" class="modal-nav modal-prev" onclick="stepModal(-1)" data-i18n-aria="prevImage">&#10094;</button>
    <img class="modal-content" id="img01" alt="">
    <button type="button" class="modal-nav modal-next" onclick="stepModal(1)" data-i18n-aria="nextImage">&#10095;</button>
    <div class="modal-caption" id="modalCaption"></div>
</div>

<script>
    // Lightbox mit Navigation: galleryData wird in buildGallery gefüllt,
    // sodass man mit Pfeilen/Pfeiltasten/Wischen durch alle Werke blättern kann
    const galleryData = []; // { src, title, dims }
    let modalIndex = -1;

    function renderModal() {
        const entry = galleryData[modalIndex];
        if (!entry) return;
        resetZoom(); // jedes Bild startet ungezoomt
        const modalImg = document.getElementById("img01");
        modalImg.src = entry.src;
        modalImg.alt = entry.title || "";

        const caption = document.getElementById("modalCaption");
        caption.textContent = "";
        if (entry.title) {
            caption.appendChild(document.createTextNode(entry.title));
            const dims = document.createElement("span");
            dims.className = "dims";
            dims.textContent = " · " + entry.dims;
            caption.appendChild(dims);
        }

        document.getElementById("modalCounter").textContent =
            (modalIndex + 1) + " / " + galleryData.length;
    }

    function openModal(index) {
        modalIndex = index;
        renderModal();
        document.getElementById("myModal").classList.add("open");
        document.body.style.overflow = "hidden"; // Seite dahinter nicht scrollbar
    }

    function closeModal() {
        resetZoom();
        document.getElementById("myModal").classList.remove("open");
        document.body.style.overflow = "";
    }

    function stepModal(direction) {
        if (!galleryData.length) return;
        modalIndex = (modalIndex + direction + galleryData.length) % galleryData.length;
        renderModal();
    }

    // Zoom in der Lightbox: Mausrad/Doppelklick am Desktop, Pinch am Handy;
    // gezoomt lässt sich der Ausschnitt mit Maus oder Finger verschieben
    let zoom = 1, panX = 0, panY = 0;

    function resetZoom() {
        zoom = 1; panX = 0; panY = 0;
        const img = document.getElementById("img01");
        img.style.transform = "";
        img.classList.remove("zoomed");
    }

    function applyZoom() {
        const img = document.getElementById("img01");
        // Verschiebung begrenzen, damit das Bild nicht aus dem Sichtfeld rutscht
        const maxX = (zoom - 1) * img.offsetWidth / 2;
        const maxY = (zoom - 1) * img.offsetHeight / 2;
        panX = Math.min(maxX, Math.max(-maxX, panX));
        panY = Math.min(maxY, Math.max(-maxY, panY));
        img.style.transform = "translate(" + panX + "px, " + panY + "px) scale(" + zoom + ")";
        img.classList.add("zoomed");
    }

    function zoomAt(clientX, clientY, factor) {
        const img = document.getElementById("img01");
        const newZoom = Math.min(5, Math.max(1, zoom * factor));
        if (newZoom === 1) { resetZoom(); return; }
        // Bildmittelpunkt ohne die aktuelle Verschiebung
        const rect = img.getBoundingClientRect();
        const baseX = rect.left + rect.width / 2 - panX;
        const baseY = rect.top + rect.height / 2 - panY;
        // Der Punkt unter dem Zeiger bleibt beim Zoomen unter dem Zeiger
        const ux = (clientX - baseX - panX) / zoom;
        const uy = (clientY - baseY - panY) / zoom;
        panX = clientX - baseX - ux * newZoom;
        panY = clientY - baseY - uy * newZoom;
        zoom = newZoom;
        applyZoom();
    }



    // Galerie wird zur Laufzeit aus dem Repository-Verzeichnis geladen
    // (GitHub Contents API). Diese Dateien werden nicht angezeigt:
    const EXCLUDE_FILES = new Set([
        "hero1.jpg",
        "hero2.jpg",
        "hero3.jpg",
        "hero10.jpg",
        "hero20.jpg",
        "hero30.jpg",
        "favicon.png",
        "Ueberschrifthintergrund.jpg",
        "untracked.jpg"
    ]);
    const IMAGE_EXT_RE = /\.(jpe?g|png|gif|webp)$/i;
    const REPO_CONTENTS_URL = "https://api.github.com/repos/Kunstvoll-Studio/Kunstvoll-Studio/contents/";

    // Bilder, die nicht mehr erhältlich sind: Dateinamen hier eintragen
    // (genau wie im Repository, inkl. Endung). Am Bild erscheint dann ein Hinweis.
    // Beispiel: "Meer__50x50x1.jpg",
    const UNAVAILABLE_FILES = new Set([
    "Abstrakte Stadtlandschaft__50x70x1.jpg",
    "Aqua Nullius 2.1__100x100x4.jpg",
    "China #1__50x60x1.jpg",
    "Gegen den Strom #1__70x70x1.jpg",
    "La Belle__100x120x4.JPG",
    "Meer__50x50x1.jpg",
    "NUR DIE SCHÖNEN TAGE ZÄHLEN__100x100x4.jpeg",
    "Naakt #1__60x80x2.jpg",
    "Natur - Blüten #1__50x50x1.jpg",
    "Natur - Regen #1__50x50x1.jpg",
    "Niemandsland #2__40x40x1.jpg",
    "Niemandsland 2.2__100x100x4.jpeg",
    "Niemandsland 2.3__100x100x4.jpeg",
    "Niemandsland 2.5__100x100x4.jpeg",
    "Panorama #1__70x100x2.jpg",
    "Rode Tulpjes__50x50x1.jpeg",
    "Sailing #1__140x70x4.JPG",
    "Segler__120x120x1.jpeg",
    "Strudel, auf anderen wegen__120x100x4.jpg",
    "Vasen #1__50x70x1.jpg",
    "Portrait einer Frau 1 XL__100x100x4.jpeg",
    ]);

    async function loadImageList() {
        const response = await fetch(REPO_CONTENTS_URL);
        if (!response.ok) throw new Error("GitHub API " + response.status);
        const items = await response.json();
        return items
            .filter(item => item.type === "file"
                && IMAGE_EXT_RE.test(item.name)
                && !EXCLUDE_FILES.has(item.name))
            .map(item => ({ name: item.name, downloadUrl: item.download_url }));
    }

    // Verkleinerte WebP-Vorschau über den Bild-Proxy wsrv.nl: das Raster lädt
    // so nur wenige KB pro Bild, die Lightbox weiterhin das Original
    function thumbUrl(downloadUrl, width) {
        return "https://wsrv.nl/?url=" + encodeURIComponent(downloadUrl)
            + "&w=" + width + "&output=webp&q=78";
    }

    function parseFilename(filename) {
        const base = filename.replace(/\.[^.]+$/, '');
        const sep = base.lastIndexOf('__');
        if (sep === -1) return { title: null, dims: null };
        const dims = base.slice(sep + 2);
        if (!/^\d+x\d+x\d+$/.test(dims)) return { title: null, dims: null };
        return { title: base.slice(0, sep), dims: dims + ' cm' };
    }

    // 3D-Karteneffekt: kippt die Karte je nach Mausposition und setzt die
    // CSS-Variablen, die style.css für Transform und Glanzlicht auswertet
    const TILT_MAX = 10; // maximaler Kippwinkel in Grad

    function enableTilt(media) {
        media.addEventListener('pointermove', (e) => {
            if (e.pointerType !== 'mouse') return; // kein Kippen beim Scrollen auf Touchgeräten
            const rect = media.getBoundingClientRect();
            const px = (e.clientX - rect.left) / rect.width;  // 0 = links, 1 = rechts
            const py = (e.clientY - rect.top) / rect.height;  // 0 = oben, 1 = unten
            media.style.setProperty('--ry', ((px - 0.5) * 2 * TILT_MAX).toFixed(2) + 'deg');
            media.style.setProperty('--rx', ((0.5 - py) * 2 * TILT_MAX).toFixed(2) + 'deg');
            media.style.setProperty('--mx', (px * 100).toFixed(1) + '%');
            media.style.setProperty('--my', (py * 100).toFixed(1) + '%');
        });
        media.addEventListener('pointerleave', () => {
            media.style.removeProperty('--rx');
            media.style.removeProperty('--ry');
        });
    }

    async function buildGallery() {
        const grid = document.querySelector('.gallery-grid');
        if (!grid) return;

        let galleryImages;
        try {
            galleryImages = await loadImageList();
        } catch (err) {
            console.error("Galerie konnte nicht geladen werden:", err);
            return;
        }

        const fragment = document.createDocumentFragment();
        galleryImages.forEach((file, index) => {
            const { title, dims } = parseFilename(file.name);
            const src = encodeURIComponent(file.name); // Original für die Lightbox
            galleryData.push({ src, title, dims });

            const item = document.createElement('div');
            item.className = 'gallery-item reveal';
            // Gestaffeltes Einblenden: Nachbarn erscheinen kurz nacheinander
            item.style.transitionDelay = (index % 4) * 70 + 'ms';

            // Bild und Badge liegen in einem gemeinsamen Wrapper,
            // damit beide beim Hovern zusammen kippen und skalieren
            const media = document.createElement('div');
            media.className = 'gallery-media';

            // Seitenverhältnis aus den Werkmaßen (z. B. 100x70):
            // der Platzhalter hat schon die richtige Größe, nichts springt
            if (dims) {
                const [w, h] = dims.split('x');
                media.style.aspectRatio = w + ' / ' + h;
            }

            const img = document.createElement('img');
            // Das Raster lädt kleine WebP-Vorschauen passend zur Anzeigegröße
            if (file.downloadUrl) {
                img.src = thumbUrl(file.downloadUrl, 480);
                img.srcset = thumbUrl(file.downloadUrl, 480) + ' 480w, '
                           + thumbUrl(file.downloadUrl, 960) + ' 960w';
                img.sizes = '(max-width: 640px) 92vw, 300px';
            } else {
                img.src = src;
            }
            img.alt = title || file.name;
            img.loading = 'lazy';
            img.decoding = 'async';
            img.addEventListener('click', () => openModal(index));
            // Schimmer-Platzhalter beenden, sobald das Bild da ist
            const markLoaded = () => media.classList.add('loaded');
            img.addEventListener('load', markLoaded);
            // Fällt der Bild-Proxy aus, das Original direkt laden
            img.addEventListener('error', () => {
                if (!img.dataset.fallback) {
                    img.dataset.fallback = '1';
                    img.removeAttribute('srcset');
                    img.removeAttribute('sizes');
                    img.src = src;
                } else {
                    markLoaded(); // auch das Original scheitert: Schimmer beenden
                }
            });
            if (img.complete && img.naturalWidth) markLoaded();
            media.appendChild(img);

            if (UNAVAILABLE_FILES.has(file.name)) {
                item.classList.add('unavailable');
                const badge = document.createElement('div');
                badge.className = 'badge-unavailable';
                badge.dataset.i18n = 'unavailable'; // wird beim Sprachwechsel mit übersetzt
                badge.textContent = t('unavailable');
                media.appendChild(badge);
            }

            enableTilt(media);
            item.appendChild(media);

            if (title) {
                const overlay = document.createElement('div');
                overlay.className = 'overlay';
                const text = document.createElement('div');
                text.className = 'text';
                text.appendChild(document.createTextNode(title));
                text.appendChild(document.createElement('br'));
                text.appendChild(document.createTextNode(dims));
                overlay.appendChild(text);
                item.appendChild(overlay);
            }

            fragment.appendChild(item);
        });
        grid.appendChild(fragment);

        // Einblenden beim Scrollen (observeReveal kommt aus effects.js)
        if (typeof observeReveal === 'function') {
            grid.querySelectorAll('.gallery-item').forEach(observeReveal);
        } else {
            grid.querySelectorAll('.gallery-item').forEach(el => el.classList.add('visible'));
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        buildGallery();

        // Hero-Slider: weiche Überblendung, Ken-Burns-Zoom (style.css),
        // Punkte-Navigation und Pause, solange die Maus darüber steht
        const slider = document.querySelector('.slider');
        const slides = document.querySelectorAll('.slide');
        const dotsWrap = document.querySelector('.slider-dots');
        if (slider && slides.length) {
            let currentIndex = 0;
            let timer = null;

            const dots = Array.from(slides, (_, i) => {
                const dot = document.createElement('button');
                dot.type = 'button';
                dot.setAttribute('aria-label', 'Slide ' + (i + 1));
                dot.addEventListener('click', () => { goToSlide(i); restartTimer(); });
                dotsWrap.appendChild(dot);
                return dot;
            });

            function goToSlide(index) {
                slides[currentIndex].classList.remove('active');
                dots[currentIndex].classList.remove('active');
                currentIndex = index;
                slides[currentIndex].classList.add('active');
                dots[currentIndex].classList.add('active');
            }

            function nextSlide() {
                goToSlide((currentIndex + 1) % slides.length);
            }

            function restartTimer() {
                clearInterval(timer);
                timer = setInterval(nextSlide, 6500);
            }

            goToSlide(0);
            restartTimer();
            slider.addEventListener('mouseenter', () => clearInterval(timer));
            slider.addEventListener('mouseleave', restartTimer);

            // Goldstaub: wenige, langsam aufsteigende Lichtpunkte mit
            // zufälliger Größe, Bahn und Geschwindigkeit (Stil: Goldakzent)
            const particleWrap = document.querySelector('.slider-particles');
            const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (particleWrap && !reducedMotion) {
                for (let i = 0; i < 9; i++) {
                    const p = document.createElement('span');
                    p.style.left = (4 + Math.random() * 92) + '%';
                    p.style.setProperty('--size', (3 + Math.random() * 3).toFixed(1) + 'px');
                    p.style.setProperty('--dur', (10 + Math.random() * 9).toFixed(1) + 's');
                    p.style.setProperty('--delay', (Math.random() * 12).toFixed(1) + 's');
                    p.style.setProperty('--driftX', ((Math.random() - 0.5) * 80).toFixed(0) + 'px');
                    p.style.setProperty('--alpha', (0.25 + Math.random() * 0.35).toFixed(2));
                    particleWrap.appendChild(p);
                }
            }
        }

        // Lightbox: Klick auf den dunklen Hintergrund schließt,
        // Pfeiltasten blättern, Escape schließt, Wischen am Handy blättert
        const modal = document.getElementById("myModal");
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (!modal.classList.contains('open')) return;
            if (e.key === 'Escape') closeModal();
            else if (e.key === 'ArrowLeft') stepModal(-1);
            else if (e.key === 'ArrowRight') stepModal(1);
        });

        let touchStartX = null;
        modal.addEventListener('touchstart', (e) => {
            // kein Blättern bei Pinch oder gezoomtem Bild
            touchStartX = (e.touches.length === 1 && zoom === 1)
                ? e.touches[0].clientX : null;
        }, { passive: true });
        modal.addEventListener('touchend', (e) => {
            if (touchStartX === null || zoom > 1) return;
            const deltaX = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(deltaX) > 50) stepModal(deltaX > 0 ? -1 : 1);
            touchStartX = null;
        }, { passive: true });

        // Zoom-Gesten auf dem Lightbox-Bild
        const modalImg = document.getElementById('img01');

        // Mausrad zoomt zur Zeigerposition
        modalImg.addEventListener('wheel', (e) => {
            e.preventDefault();
            zoomAt(e.clientX, e.clientY, e.deltaY < 0 ? 1.25 : 0.8);
        }, { passive: false });

        // Doppelklick wechselt zwischen Originalansicht und 2,5-fachem Zoom
        modalImg.addEventListener('dblclick', (e) => {
            if (zoom > 1) resetZoom();
            else zoomAt(e.clientX, e.clientY, 2.5);
        });

        // natives Bild-Ziehen des Browsers unterbinden
        modalImg.addEventListener('dragstart', (e) => e.preventDefault());

        // Ein Zeiger verschiebt den gezoomten Ausschnitt, zwei Finger zoomen (Pinch)
        const activePointers = new Map();
        let lastPinchDist = null;

        modalImg.addEventListener('pointerdown', (e) => {
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
            if (zoom > 1) {
                e.preventDefault();
                modalImg.setPointerCapture(e.pointerId);
            }
        });

        modalImg.addEventListener('pointermove', (e) => {
            const prev = activePointers.get(e.pointerId);
            if (!prev) return;
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

            if (activePointers.size === 2) {
                // Pinch: der Abstand beider Finger steuert den Zoom
                const [a, b] = [...activePointers.values()];
                const dist = Math.hypot(a.x - b.x, a.y - b.y);
                if (lastPinchDist) {
                    zoomAt((a.x + b.x) / 2, (a.y + b.y) / 2, dist / lastPinchDist);
                }
                lastPinchDist = dist;
            } else if (zoom > 1) {
                panX += e.clientX - prev.x;
                panY += e.clientY - prev.y;
                applyZoom();
            }
        });

        const endPointer = (e) => {
            activePointers.delete(e.pointerId);
            lastPinchDist = null;
        };
        modalImg.addEventListener('pointerup', endPointer);
        modalImg.addEventListener('pointercancel', endPointer);
    });

</script>
</body>
</html>
